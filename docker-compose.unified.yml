services:
  postgres:
    image: postgres:16-alpine
    container_name: unified-postgres
    environment:
      POSTGRES_DB: timetracker
      POSTGRES_USER: timetracker
      POSTGRES_PASSWORD: timetracker
    volumes:
      - timetracker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timetracker -d timetracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  timetracker-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.unified
    container_name: timetracker-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/timetracker
      SPRING_DATASOURCE_USERNAME: timetracker
      SPRING_DATASOURCE_PASSWORD: timetracker
      JWT_SECRET: ${JWT_SECRET:-dev-local-jwt-secret-please-change-this-in-prod-at-least-64-bytes-long-1234567890}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:5173,http://localhost:3000,http://localhost:8088}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL_NAME: ${OPENAI_MODEL_NAME:-gpt-4o-mini}
    depends_on:
      postgres:
        condition: service_healthy

  agentic-backend:
    build:
      context: ../../A_Lyf/Agentic_lyf/backend
      dockerfile: Dockerfile.unified
    container_name: agentic-backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_ENDPOINT: ${OLLAMA_ENDPOINT:-http://host.docker.internal:11434}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8088}
      CORS_ALLOWED_ORIGIN_REGEX: ${CORS_ALLOWED_ORIGIN_REGEX:-}

  timetracker-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.unified
      args:
        VITE_AGENTIC_API_PREFIX: /agentic-api
        VITE_TIMETRACKER_API_ORIGIN: ${VITE_TIMETRACKER_API_ORIGIN:-}
        VITE_AGENTIC_API_ORIGIN: ${VITE_AGENTIC_API_ORIGIN:-}
    container_name: timetracker-frontend
    depends_on:
      - timetracker-backend

  agentic-frontend:
    build:
      context: ../../A_Lyf/Agentic_lyf/frontend
      dockerfile: Dockerfile.unified
      args:
        VITE_BASE_PATH: /coach/
        VITE_AGENTIC_API_PREFIX: /agentic-api
        VITE_AGENTIC_API_ORIGIN: ${VITE_AGENTIC_API_ORIGIN:-}
        VITE_AGENTIC_WS_ORIGIN: ${VITE_AGENTIC_WS_ORIGIN:-}
    container_name: agentic-frontend
    depends_on:
      - agentic-backend

  unified-gateway:
    image: nginx:1.27-alpine
    container_name: unified-gateway
    depends_on:
      - timetracker-backend
      - agentic-backend
      - timetracker-frontend
      - agentic-frontend
    ports:
      - "8088:80"
    volumes:
      - ./unified/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  timetracker_postgres_data:
