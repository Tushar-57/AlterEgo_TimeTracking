spring.application.name=timetracker


spring.datasource.url=jdbc:h2:mem:timetracker
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# H2 Console enable karo (Browser mein http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:dev-only-change-me-before-production-0123456789abcdefghijklmnopqrstuvwxyz-ABCDEFGHIJKLMNOPQRSTUVWXYZ}
jwt.expiration=${JWT_EXPIRATION:86400}

app.auth.cookie.name=${AUTH_COOKIE_NAME:auth_token}
app.auth.cookie.max-age-seconds=${AUTH_COOKIE_MAX_AGE_SECONDS:86400}
app.auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
app.auth.cookie.secure=${AUTH_COOKIE_SECURE:false}

app.auth.signup.mx-check-enabled=${AUTH_SIGNUP_MX_CHECK_ENABLED:true}
app.auth.signup.require-mx-record=${AUTH_SIGNUP_REQUIRE_MX_RECORD:false}
app.auth.signup.mx-check-fail-open=${AUTH_SIGNUP_MX_FAIL_OPEN:true}
app.auth.signup.mx-timeout-ms=${AUTH_SIGNUP_MX_TIMEOUT_MS:2000}
app.auth.signup.allowed-domains=${AUTH_SIGNUP_ALLOWED_DOMAINS:}
app.auth.signup.blocked-domains=${AUTH_SIGNUP_BLOCKED_DOMAINS:}

app.auth.password-reset.code-ttl-minutes=${AUTH_PASSWORD_RESET_CODE_TTL_MINUTES:15}
app.auth.password-reset.max-attempts=${AUTH_PASSWORD_RESET_MAX_ATTEMPTS:5}
app.auth.password-reset.dev-return-code=${AUTH_PASSWORD_RESET_DEV_RETURN_CODE:true}

app.auth.email-verification.code-ttl-minutes=${AUTH_EMAIL_VERIFICATION_CODE_TTL_MINUTES:10}
app.auth.email-verification.max-attempts=${AUTH_EMAIL_VERIFICATION_MAX_ATTEMPTS:5}
app.auth.email-verification.dev-return-code=${AUTH_EMAIL_VERIFICATION_DEV_RETURN_CODE:true}
app.auth.email-verification.require-before-login=${AUTH_EMAIL_VERIFICATION_REQUIRE_BEFORE_LOGIN:true}

app.mail.enabled=${MAIL_ENABLED:true}
app.mail.maileroo.base-url=${MAILEROO_BASE_URL:https://smtp.maileroo.com/api/v2}
app.mail.maileroo.api-key=${MAILEROO_API_KEY:}
app.mail.from-email=${MAILEROO_FROM_EMAIL:}
app.mail.from-name=${MAILEROO_FROM_NAME:AlterEgo}
app.mail.request-timeout-ms=${MAIL_REQUEST_TIMEOUT_MS:5000}
app.mail.fail-on-delivery-error=${MAIL_FAIL_ON_DELIVERY_ERROR:false}

app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:3000,http://localhost:8088,https://*.vercel.app,https://*.netlify.app}

app.security.frame.same-origin=${APP_SECURITY_FRAME_SAME_ORIGIN:true}
app.security.csp.policy=${APP_SECURITY_CSP_POLICY:default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' http://localhost:5173 http://localhost:8080 http://localhost:8000; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'}

openai.api.key=${OPENAI_API_KEY:}
open-ai.model-name=gpt-3.5-turbo

agentic.sync.enabled=${AGENTIC_SYNC_ENABLED:false}
agentic.sync.base-url=${AGENTIC_SYNC_BASE_URL:}
agentic.sync.connect-timeout-ms=${AGENTIC_SYNC_CONNECT_TIMEOUT_MS:5000}
agentic.sync.request-timeout-ms=${AGENTIC_SYNC_REQUEST_TIMEOUT_MS:8000}
