spring.application.name=timetracker

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/timetracker}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:timetracker}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:timetracker}

spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400}

app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:3000,http://localhost:8088,https://*.vercel.app,https://*.netlify.app}

openai.api.key=${OPENAI_API_KEY:}
open-ai.model-name=${OPENAI_MODEL_NAME:gpt-4o-mini}
