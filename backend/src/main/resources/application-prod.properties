spring.application.name=timetracker

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/timetracker}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:timetracker}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400}

app.auth.cookie.name=${AUTH_COOKIE_NAME:auth_token}
app.auth.cookie.max-age-seconds=${AUTH_COOKIE_MAX_AGE_SECONDS:${JWT_EXPIRATION:86400}}
app.auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:None}
app.auth.cookie.secure=${AUTH_COOKIE_SECURE:true}

app.auth.signup.mx-check-enabled=${AUTH_SIGNUP_MX_CHECK_ENABLED:true}
app.auth.signup.require-mx-record=${AUTH_SIGNUP_REQUIRE_MX_RECORD:true}
app.auth.signup.mx-check-fail-open=${AUTH_SIGNUP_MX_FAIL_OPEN:true}
app.auth.signup.mx-timeout-ms=${AUTH_SIGNUP_MX_TIMEOUT_MS:2500}
app.auth.signup.allowed-domains=${AUTH_SIGNUP_ALLOWED_DOMAINS:}
app.auth.signup.blocked-domains=${AUTH_SIGNUP_BLOCKED_DOMAINS:mailinator.com,tempmail.com,10minutemail.com,guerrillamail.com,yopmail.com}

app.auth.password-reset.code-ttl-minutes=${AUTH_PASSWORD_RESET_CODE_TTL_MINUTES:15}
app.auth.password-reset.max-attempts=${AUTH_PASSWORD_RESET_MAX_ATTEMPTS:5}
app.auth.password-reset.dev-return-code=${AUTH_PASSWORD_RESET_DEV_RETURN_CODE:false}

app.auth.email-verification.code-ttl-minutes=${AUTH_EMAIL_VERIFICATION_CODE_TTL_MINUTES:10}
app.auth.email-verification.max-attempts=${AUTH_EMAIL_VERIFICATION_MAX_ATTEMPTS:5}
app.auth.email-verification.dev-return-code=${AUTH_EMAIL_VERIFICATION_DEV_RETURN_CODE:false}
app.auth.email-verification.require-before-login=${AUTH_EMAIL_VERIFICATION_REQUIRE_BEFORE_LOGIN:true}

app.mail.enabled=${MAIL_ENABLED:true}
app.mail.maileroo.base-url=${MAILEROO_BASE_URL:https://smtp.maileroo.com/api/v2}
app.mail.maileroo.api-key=${MAILEROO_API_KEY:}
app.mail.from-email=${MAILEROO_FROM_EMAIL:}
app.mail.from-name=${MAILEROO_FROM_NAME:AlterEgo}
app.mail.request-timeout-ms=${MAIL_REQUEST_TIMEOUT_MS:5000}
app.mail.fail-on-delivery-error=${MAIL_FAIL_ON_DELIVERY_ERROR:false}

app.security.frame.same-origin=${APP_SECURITY_FRAME_SAME_ORIGIN:false}
app.security.csp.policy=${APP_SECURITY_CSP_POLICY:default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'}

app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:3000,http://localhost:8088,https://*.vercel.app,https://*.netlify.app}

openai.api.key=${OPENAI_API_KEY:}
open-ai.model-name=${OPENAI_MODEL_NAME:gpt-4o-mini}

agentic.sync.enabled=${AGENTIC_SYNC_ENABLED:false}
agentic.sync.base-url=${AGENTIC_SYNC_BASE_URL:}
agentic.sync.max-attempts=${AGENTIC_SYNC_MAX_ATTEMPTS:3}
agentic.sync.retry-backoff-ms=${AGENTIC_SYNC_RETRY_BACKOFF_MS:350}
agentic.sync.connect-timeout-ms=${AGENTIC_SYNC_CONNECT_TIMEOUT_MS:5000}
agentic.sync.request-timeout-ms=${AGENTIC_SYNC_REQUEST_TIMEOUT_MS:12000}
agentic.sync.onboarding-read-sync-enabled=${AGENTIC_SYNC_ONBOARDING_READ_SYNC_ENABLED:false}
